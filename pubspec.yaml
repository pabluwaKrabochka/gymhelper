name: gymhelper
description: "stuff"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.1 <4.0.0' 

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_bloc: ^8.1.6

  sqflite: ^2.3.3+3
  path: ^1.9.0
  shared_preferences: ^2.5.4

  get_it: ^8.0.2

  fl_chart: ^1.2.0

  intl: 0.20.2

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_localizations:
    sdk: flutter
  lottie: ^3.3.3
  http: ^1.6.0
  flutter_colorpicker: ^1.1.0
  carousel_slider: ^5.1.2
  flutter_slidable: ^3.1.1
  iconsax_plus: ^1.0.0
  share_plus: ^12.0.2
  gal: ^2.3.2
  path_provider: ^2.1.5
  image_picker: ^1.2.2
  image_cropper: ^12.2.1
  easy_localization: ^3.0.8
  
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appLogo.png"
  adaptive_icon_foreground: "assets/appLogo.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/

  fonts:
    - family: ScienceGothic 
      fonts:
        - asset: fonts/ScienceGothic/ScienceGothic-Thin.ttf
          weight: 100
        - asset: fonts/ScienceGothic/ScienceGothic-ExtraLight.ttf
          weight: 200
        - asset: fonts/ScienceGothic/ScienceGothic-Light.ttf
          weight: 300
        - asset: fonts/ScienceGothic/ScienceGothic-Regular.ttf
          weight: 400
        - asset: fonts/ScienceGothic/ScienceGothic-Medium.ttf
          weight: 500
        - asset: fonts/ScienceGothic/ScienceGothic-SemiBold.ttf
          weight: 600
        - asset: fonts/ScienceGothic/ScienceGothic-Bold.ttf
          weight: 700
        - asset: fonts/ScienceGothic/ScienceGothic-ExtraBold.ttf
          weight: 800
        - asset: fonts/ScienceGothic/ScienceGothic-Black.ttf
          weight: 900