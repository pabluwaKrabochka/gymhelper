name: gymhelper
description: "stuff"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.1 <4.0.0' 

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_bloc: ^8.1.6

  sqflite: ^2.3.3+3
  path: ^1.9.0
  shared_preferences: ^2.5.4

  get_it: ^8.0.2

  fl_chart: ^1.2.0

  intl: 0.20.2

  freezed_annotation: ^2.4.4
